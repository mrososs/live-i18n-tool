name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      # Match the npm major the lockfile was generated with (npm 11) so
      # `npm ci` resolves an identical tree. Node 22 ships npm 10 by default.
      - run: npm install -g npm@11

      - run: npm ci

      # Playwright browsers for the e2e target (chromium/firefox/webkit).
      - run: npx playwright install --with-deps

      - run: npx nx format:check --base="remotes/origin/main"
      - run: npx nx run-many -t lint test build typecheck e2e
